kind = "web"
previewPath = "/"
title = "صفحة الترخيص والتسجيل"
version = "1.0.0"
id = "artifacts/formalization-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22043

[services.development]
run = "pnpm --filter @workspace/formalization-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/formalization-landing", "run", "build" ]
publicDir = "artifacts/formalization-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22043"
BASE_PATH = "/"
